services:
  directory-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "${OUTGOING_PORT:-5000}:5000"
    environment:
      DIR_BROWSER_LOG_LEVEL: ${DIR_BROWSER_LOG_LEVEL:-CRITICAL}
      DIR_BROWSER_FLASK_DEBUG: ${DIR_BROWSER_FLASK_DEBUG:-False}
    volumes:
      # Host path (MEDIA_DIR) is mounted at /mnt/data inside the container (fixed in directory_server.py)
      - ${MEDIA_DIR:-/share/data}:/mnt/data:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - directory-network

  # Optional: Add a reverse proxy with nginx for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - directory-server
    restart: unless-stopped
    networks:
      - directory-network
    profiles:
      - production

networks:
  directory-network:
    driver: bridge